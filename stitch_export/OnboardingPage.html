        body { font-family: 'Public Sans', sans-serif; }

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="bg-white dark:bg-neutral-900 border-b border-neutral-200 dark:border-neutral-800 flex items-center justify-between px-4 h-16 w-full sticky top-0 z-40 transition-colors duration-200">
<button class="text-neutral-500 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 p-2 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Public_Sans'] font-bold text-lg text-neutral-900 dark:text-white">Onboarding</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 w-full max-w-md mx-auto px-6 pt-8 pb-32">
<!-- Progress Bar -->
<div class="mb-10">
<div class="flex justify-between items-center mb-3">
<span class="text-xs font-bold text-primary uppercase tracking-wider">Step 3 of 10</span>
<span class="text-xs font-medium text-secondary">30% Complete</span>
</div>
<div class="h-2 w-full bg-secondary-fixed rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-[30%] rounded-full"></div>
</div>
</div>
<!-- Question Header -->
<div class="text-center mb-10">
<h2 class="text-2xl font-extrabold text-on-surface leading-tight mb-3">
                What type of whiskey or bourbon do you prefer?
            </h2>
<p class="text-secondary text-sm">Help us personalize your neighborhood spirit recommendations.</p>
</div>
<!-- Selection List -->
<div class="space-y-4">
<!-- Option Card: Scotch -->
<label class="relative block cursor-pointer group">
<input class="sr-only peer" name="liquor_type" type="radio"/>
<div class="flex items-center p-5 rounded-[16px] border border-outline-variant bg-white hover:bg-surface-container-low transition-all duration-200 peer-checked:border-primary-container peer-checked:bg-primary/5">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-secondary" data-icon="glass_cup">glass_cup</span>
</div>
<span class="text-base font-semibold text-on-surface">Scotch</span>
<div class="ml-auto opacity-0 peer-checked:opacity-100">
<span class="material-symbols-outlined text-primary-container" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Option Card: Bourbon (Selected State) -->
<label class="relative block cursor-pointer group">
<input checked="" class="sr-only peer" name="liquor_type" type="radio"/>
<div class="flex items-center p-5 rounded-[16px] border border-primary-container bg-primary/5 transition-all duration-200">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-primary" data-icon="liquor" style="font-variation-settings: 'FILL' 1;">liquor</span>
</div>
<span class="text-base font-semibold text-on-surface">Bourbon</span>
<div class="ml-auto opacity-100">
<span class="material-symbols-outlined text-primary-container" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Option Card: Rye -->
<label class="relative block cursor-pointer group">
<input class="sr-only peer" name="liquor_type" type="radio"/>
<div class="flex items-center p-5 rounded-[16px] border border-outline-variant bg-white hover:bg-surface-container-low transition-all duration-200 peer-checked:border-primary-container peer-checked:bg-primary/5">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-secondary" data-icon="agriculture">agriculture</span>
</div>
<span class="text-base font-semibold text-on-surface">Rye</span>
<div class="ml-auto opacity-0 peer-checked:opacity-100">
<span class="material-symbols-outlined text-primary-container" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Option Card: Peaty -->
<label class="relative block cursor-pointer group">
<input class="sr-only peer" name="liquor_type" type="radio"/>
<div class="flex items-center p-5 rounded-[16px] border border-outline-variant bg-white hover:bg-surface-container-low transition-all duration-200 peer-checked:border-primary-container peer-checked:bg-primary/5">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-secondary" data-icon="air">air</span>
</div>
<span class="text-base font-semibold text-on-surface">Peaty</span>
<div class="ml-auto opacity-0 peer-checked:opacity-100">
<span class="material-symbols-outlined text-primary-container" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Option Card: Floral -->
<label class="relative block cursor-pointer group">
<input class="sr-only peer" name="liquor_type" type="radio"/>
<div class="flex items-center p-5 rounded-[16px] border border-outline-variant bg-white hover:bg-surface-container-low transition-all duration-200 peer-checked:border-primary-container peer-checked:bg-primary/5">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-secondary" data-icon="local_florist">local_florist</span>
</div>
<span class="text-base font-semibold text-on-surface">Floral</span>
<div class="ml-auto opacity-0 peer-checked:opacity-100">
<span class="material-symbols-outlined text-primary-container" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Option Card: Woody -->
<label class="relative block cursor-pointer group">
<input class="sr-only peer" name="liquor_type" type="radio"/>
<div class="flex items-center p-5 rounded-[16px] border border-outline-variant bg-white hover:bg-surface-container-low transition-all duration-200 peer-checked:border-primary-container peer-checked:bg-primary/5">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mr-4">

<span class="material-symbols-outlined text-primary-container" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
</div>
</main>
<!-- Bottom Navigation Controls -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex flex-col items-center bg-white dark:bg-neutral-900 px-6 py-6 pb-safe border-t border-neutral-200 dark:border-neutral-800 shadow-lg dark:shadow-none">
<div class="w-full max-w-md flex flex-col gap-4">
<!-- Next Button -->
<button class="w-full bg-primary-container text-white py-4 px-8 rounded-full font-bold text-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-md">
<span>Next</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Skip Link -->
<button class="w-full text-secondary font-medium text-sm py-2 hover:text-on-surface transition-colors flex items-center justify-center gap-1">

<span class="material-symbols-outlined text-sm" data-icon="close">close</span>

</div>
